name: Release
run-name: ${{ format('{0} {1}', inputs.is-dry-run && 'Dry-run' || 'Release', inputs.tag) }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag / Version number"
        required: true
      is-dry-run:
        description: "Dry-run (do not publish, only test build)"
        type: boolean

permissions:
  contents: write # required for pushing to the repository and creating releases

env:
  changelog: CHANGELOG.md
  thunderstore-config: thunderstore.toml
  build-dir: build
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: ${{ format('{0} {1}', inputs.is-dry-run && 'Dry-run' || 'Release', inputs.tag) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check input tag format
        run: |
          if ! echo "${{ inputs.tag }}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error title=Invalid package version number::Version numbers must follow the Major.Minor.Patch format (e.g. 1.45.320)."
            exit 1
          fi

      - name: Checkout files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout ModpackTools
        uses: actions/checkout@v4
        with:
          repository: h2-modpack/ModpackTools
          path: .modpacktools
          ref: main

      - name: Checkout Lib
        uses: actions/checkout@v4
        with:
          repository: h2-modpack/adamant-ModpackLib
          path: .modpacklib
          ref: main

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.2"

      - name: Setup Luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install Luacheck
        run: luarocks install luacheck

      - name: Validate package sources
        run: |
          luacheck src/
          find src -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac -p
          if [ -d tests ]; then
            find tests -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac -p
          fi

      - name: Install LuaUnit
        if: ${{ hashFiles('tests/all.lua') != '' || hashFiles('tests/integration.lua') != '' }}
        run: luarocks install luaunit

      - name: Run tests
        if: ${{ hashFiles('tests/all.lua') != '' }}
        run: lua tests/all.lua

      - name: Run integration tests
        if: ${{ hashFiles('tests/integration.lua') != '' }}
        run: lua tests/integration.lua

      - name: Prepare release files
        run: python .modpacktools/github/prepare_package_release.py --tag '${{ inputs.tag }}' --allow-empty --release-notes-output .release-notes.md

      - name: Install Thunderstore CLI
        run: dotnet tool install -g tcli

      - name: Build package
        run: |
          tcli build
          ARTIFACT_NAME=$(find "${{ env.build-dir }}" -type f -printf "%f\n")
          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "artifact-path=${{ env.build-dir }}/${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ env.artifact-name }}
          path: ${{ env.artifact-path }}
          retention-days: 1

      - name: Publish package
        if: ${{ !inputs.is-dry-run }}
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.TCLI_AUTH_TOKEN }}
        run: tcli publish --file ${{ env.artifact-path }}

      - name: Tag and push to repository
        if: ${{ !inputs.is-dry-run }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ${{ env.changelog }} ${{ env.thunderstore-config }}
          git commit --message "chore(release): ${{ inputs.tag }}"
          git tag ${{ inputs.tag }} --annotate --message "Release ${{ inputs.tag }}"
          git push origin HEAD:${{ github.ref_name }} --tags

      - name: Create release and upload artifact
        if: ${{ !inputs.is-dry-run }}
        run: |
          gh release create \
            '${{ inputs.tag }}' \
            '${{ env.artifact-path }}' \
            --title '${{ inputs.tag }}' \
            --notes-file '.release-notes.md' \
            --repo '${{ github.repository }}' \
            --target '${{ github.ref_name }}' \
            --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
